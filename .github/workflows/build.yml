name: Build and Push Docker Image
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # CUDA_ARCH: 120=Blackwell(PRO 6000/5090) 89=Ada(L40S/4090) 86=Ampere(A6000)
          build-args: |
            CUDA_ARCH=120
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/runpod-agentic-qwen:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
